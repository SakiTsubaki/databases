<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respaldo de Base de Datos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #2a2a35;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #e0e0e6;
        }
        p {
            color: #a0a0b0;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn-download {
            display: inline-block;
            background-color: #f6821f; /* Color naranja Cloudflare */
            color: white;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-download:hover {
            background-color: #e07318;
        }
        .btn-download:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gestión de Base de Datos</h1>
        <p>Haz clic abajo para ver Base de datos</p>

        <!-- El atributo 'download' fuerza la descarga en lugar de abrir el texto en el navegador -->
        <a href="bdchamakes_activations.sql"class="btn-download">
            Ver bdchamakes_activations.sql
        </a>
    </div>

</body>
</html>
